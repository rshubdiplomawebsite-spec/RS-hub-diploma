<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mathematics | RS Hub Diploma</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI', Arial;
    background: linear-gradient(to right, #eef5ff, #f8fbff);
}

/* Header */
header{
    background:#1565c0;
    color:white;
    padding:20px;
    text-align:center;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

/* Container */
.container{
    padding:30px 20px;
    max-width:1000px;
    margin:auto;
}

/* Grid */
.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap:20px;
}

/* Card */
.card{
    background:white;
    border-radius:12px;
    padding:25px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

/* Button */
.card a{
    display:inline-block;
    margin-top:10px;
    padding:10px 20px;
    background:#1565c0;
    color:white;
    text-decoration:none;
    border-radius:6px;
}

.card a:hover{
    background:#1e88e5;
}

.icon{
    font-size:40px;
}

</style>

</head>

<body>

<header>
    <h1>JUT Diploma 1st sem Engineering Mathematics | RS Hub Diploma</h1>
    <p>Study Materials for Diploma Students</p>
</header>

<div class="container">

<div class="grid">

    <div class="card">
        <div class="icon">🎥</div>
        <h2>Video Lectures</h2>
        <p>Watch Math lectures.</p>
        <a href="math-video.html">Open</a>
    </div>

    <div class="card">
        <div class="icon">📝</div>
        <h2>Important Questions</h2>
        <p>Exam oriented questions.</p>
        <a href="math-questions.html">Open</a>
    </div>

    <div class="card">
        <div class="icon">📄</div>
        <h2>PYQ</h2>
        <p>Previous year papers.</p>
        <a href="mathpyq.html">Open</a>
    </div>

    <div class="card">
        <div class="icon">📘</div>
        <h2>Notes</h2>
        <p>All units notes.</p>
        <a href="mathnotes.html">Open</a>
    </div>

</div>

</div>

</body>
</html>
